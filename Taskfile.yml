version: "3"

vars:
  IMAGE_NAME: ipedrazas/space-invaders
  IMAGE_TAG: latest

tasks:
  build:
    desc: Build the Docker image
    cmds:
      - docker build --platform linux/arm64,linux/amd64 -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} . --push

  run:
    desc: Run the game in a Docker container on port 8080
    deps: [build]
    cmds:
      - docker run --rm -p 8080:80 {{.IMAGE_NAME}}:{{.IMAGE_TAG}}

  stop:
    desc: Stop running containers
    cmds:
      - docker rm -f $(docker ps -q --filter ancestor={{.IMAGE_NAME}}:{{.IMAGE_TAG}}) 2>/dev/null || true

  dev:
    desc: Serve locally with Python HTTP server on port 8080
    cmds:
      - python3 -m http.server 8080

  clean:
    desc: Remove the Docker image
    cmds:
      - docker rmi {{.IMAGE_NAME}}:{{.IMAGE_TAG}} 2>/dev/null || true
